          - Home Assistant: analyzer/builds/meshcore-ha.md
          - MQTT firmware: analyzer/builds/mqtt-firmware.md
          - PyMC: analyzer/builds/pymc.md
      - References:
          - Broker reference: analyzer/broker-reference.md
          - Location codes: analyzer/iata-codes.md
  - Learn:
