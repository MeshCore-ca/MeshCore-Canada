      - Antennas: hardware/recommended-antenna.md
      - Solar repeater build:
          - Build a 300 mW repeater: hardware/repeater-solar-300mw-diy-build.md
      - Install a repeater:
          - Mounting options: hardware/repeater-mounting-options.md
      - Firmware:
          - Flash a companion: meshcore/flash-companion.md
          - Flash a repeater: meshcore/flash-repeater.md
          - Flash a room server: meshcore/flash-room-server.md
          - Update a repeater over the air: meshcore/update-repeater-ota.md
  - Network Tools:
      - Choose a network tool: tools/index.md
      - Configure a repeater: config/index.md
