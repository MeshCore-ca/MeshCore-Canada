name: Propose a Region Boundary Change
description: Submit a validated census-cell boundary adjustment for public review.
title: "[Region proposal] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        This issue is a proposal, not a live map change. MeshCore Canada maintainers will validate it against the current census-cell membership, ask for community feedback, and merge only an approved change.

        The proposal contains official census-area identifiers, not private node coordinates. Do not add passwords, keys, exact home locations, or other private information.

  - type: input
    id: affected_regions
    attributes:
      label: Affected regions
      description: The current and proposed region tags prepared by the editor.
    validations:
      required: true

  - type: input
    id: change_count
    attributes:
      label: Census cells changed
    validations:
      required: true

  - type: input
    id: base_membership_sha256
    attributes:
      label: Base membership SHA-256
      description: Identifies the exact region membership used by the editor.
    validations:
      required: true

  - type: input
    id: submitted_by
    attributes:
      label: Submitted by
      description: Optional public name or handle for follow-up.

  - type: textarea
    id: reason
    attributes:
      label: Local reason for the change
      description: Explain the city, community, terrain, or radio-network knowledge supporting this proposal.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Canonical proposal
      description: This is generated by the editor. For a large proposal, drag the downloaded JSON file into this box. Maintainers regenerate GeoJSON from these authoritative census-cell changes.
      placeholder: The editor prefills validated JSON here, or attach the downloaded JSON file.
    validations:
      required: true
