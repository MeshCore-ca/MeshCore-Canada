name: Deploy reviewed site

on:
  workflow_run:
    workflows: ["Validate site quality"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: meshcore-ca-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout validated revision
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm

      - name: Build the validated revision
        env:
          MCC_SITE_REVISION: ${{ github.event.workflow_run.head_sha }}
        run: |
          python -m pip install -r requirements-docs.txt
          npm ci
          npm run docs:build
          node scripts/check-built-links.mjs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.tmp/site
          cname: meshcore.ca
