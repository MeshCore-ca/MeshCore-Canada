<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Region editor sign in · MeshCore Canada</title>
  <link rel="stylesheet" href="{{BASE_PATH}}/static/editor.css">
</head>
<body class="login-page">
  <main class="login-card" aria-labelledby="login-title">
    <div class="brand-mark" aria-hidden="true">MC</div>
    <p class="eyebrow">MeshCore Canada</p>
    <h1 id="login-title">Region boundary editor</h1>
    <p class="muted">Sign in to prepare a boundary proposal. The editor cannot publish changes directly.</p>
    <form method="post" action="{{BASE_PATH}}/login" class="login-form">
      <input type="hidden" name="csrf" value="{{LOGIN_CSRF}}">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" maxlength="80" required autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" maxlength="1024" required>
      <p class="form-error" role="alert" aria-live="polite">{{ERROR}}</p>
      <button type="submit" class="button primary full">Sign in</button>
    </form>
  </main>
</body>
</html>
